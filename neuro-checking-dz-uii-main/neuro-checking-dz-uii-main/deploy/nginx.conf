server {
    listen 80;
    server_name check.bruster-go.ru;

    # Redirect HTTP → HTTPS (после получения сертификата Let's Encrypt)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name check.bruster-go.ru;

    # Сертификаты (заполняются certbot автоматически)
    ssl_certificate     /etc/letsencrypt/live/check.bruster-go.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/check.bruster-go.ru/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 16M;

    location / {
        proxy_pass         http://127.0.0.1:5001;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}
